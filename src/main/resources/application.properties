spring.application.name=base
server.servlet.context-path=/ihwt
server.port=8083

# === MySQL (local) ===
spring.datasource.url=jdbc:mysql://localhost:3306/ihwtdb?zeroDateTimeBehavior=convertToNull&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
# === PostgreSQL (backed up) ===
#spring.datasource.url=jdbc:postgresql://127.0.0.1:5433/ihwt
#spring.datasource.username=
#spring.datasource.password=
spring.datasource.testWhileIdle = true
spring.datasource.timeBetweenEvictionRunsMillis = 3600000
spring.datasource.validationQuery = SELECT 1
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true

#security.basic.enable=false
#spring.mvc.view.prefix=/WEB-INF/jsp/
#spring.mvc.view.suffix=.jsp


security.basic.enable=false
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

spring.messages.always-use-message-format=false
spring.messages.basename=validation
spring.messages.cache-seconds=-1
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=true

# SYSTEM CONSTRAINTS
ANY_ROOM_CHILD_NO_BED_ALLOWED = 2
ANY_ROOM_CHILD_NO_BED_PERCENTAGE=20
ANY_ROOM_EXTRA_BED_ADULT_PERCENTAGE=35
ANY_ROOM_EXTRA_BED_CHILD_PERCENTAGE=25
ANY_ROOM_STANDARD_OCCUPANCY_INCREASE_PERCENTAGE=15

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ===== AI MODIFICATION START =====
# Change: Disable DevTools restart to prevent crash with JDK 21
spring.devtools.restart.enabled=false
# ===== AI MODIFICATION END =====

server.error.whitelabel.enabled=false
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=true
logging.file.name=application.log
all.email.notify.communication.active=true
email.notify.communication.email= janvi@digitalintellij.com